[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "txgen-models"
version = "1.0.0"
description = "Shared Pydantic models, auth dependencies, and schemas for TxGen services"
requires-python = ">=3.12"

dependencies = [
    "pydantic>=2.6.0",
    "pydantic-settings>=2.2.0",
    # JWT decoding — python-jose with cryptography backend for RS256
    "python-jose[cryptography]>=3.3.0",
    # Async Redis client for session storage
    "redis[asyncio]>=5.0.0",
    # HTTP client for Keycloak token calls
    "httpx>=0.27.0",
    # FastAPI for dependency types (not a web framework dep — just type hints)
    "fastapi>=0.110.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/models"]
