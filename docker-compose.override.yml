# ─────────────────────────────────────────────────────────────────────────────
# Development overrides — auto-merged by Docker Compose when you run
# `docker compose up` without specifying a -f flag.
#
# WHY THIS FILE EXISTS (and cannot be deleted):
#   Every Python Dockerfile has two stages: `builder` (deps only, no CMD) and
#   `runtime` (source baked in, has CMD). In dev we use the `builder` stage so
#   that bind-mounts provide the source — but the builder stage has NO CMD, so
#   this file MUST supply the `command` for every Python service. Without it,
#   containers would start and immediately exit with "no command specified".
#
# Key differences from production:
#   - Python services use `builder` stage + bind-mount src/ (no rebuild needed)
#   - uvicorn runs with --reload flag (FastAPI services only)
#   - React runs Vite dev server with HMR (bind-mount + anonymous node_modules)
#   - Kafka consumers restart via `docker compose restart <name>` on code change
#
# When you edit a Python file → uvicorn detects the change → restarts in ~1s
# When you edit a React file  → Vite HMR updates the browser in milliseconds
# When you edit packages/models → run: docker compose build account-api txgen-api
# ─────────────────────────────────────────────────────────────────────────────

services:

  account-api:
    build:
      target: builder          # use the builder stage which has dev tools
    volumes:
      # Bind-mount source — edits on host appear instantly inside container
      - ./services/account-api/src:/app/src
      # Shared packages also mounted so model changes reflect immediately
      - ./packages:/app/packages
    command: >
      uvicorn src.main:app
      --host 0.0.0.0
      --port 8001
      --reload
      --reload-dir /app/src
      --reload-dir /app/packages

  txgen-api:
    build:
      target: builder
    volumes:
      - ./services/txgen-api/src:/app/src
      - ./packages:/app/packages
    command: >
      uvicorn src.main:app
      --host 0.0.0.0
      --port 8002
      --reload
      --reload-dir /app/src
      --reload-dir /app/packages

  mongo-consumer:
    build:
      target: builder
    volumes:
      - ./services/mongo-consumer/src:/app/src
      - ./packages:/app/packages
    command: ["python", "-m", "src.main"]

  integrity-checker:
    build:
      target: builder
    volumes:
      - ./services/integrity-checker/src:/app/src
      - ./packages:/app/packages
    command: ["python", "-m", "src.main"]

  rag-processor:
    build:
      target: builder
    volumes:
      - ./services/rag-processor/src:/app/src
      - ./packages:/app/packages
    command: ["python", "-m", "src.main"]

  generator-ui:
    # build.target: dev is already set in docker-compose.yml — no override needed here
    volumes:
      # Entire UI mounted — Vite watches for changes
      - ./apps/generator-ui:/app
      # node_modules in anonymous volume — prevents host filesystem conflicts
      # especially important on macOS where host filesystem is slow
      - /app/node_modules
