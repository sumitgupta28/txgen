# infra/nginx/nginx.conf
#
# Serves the React SPA. The critical rule is `try_files $uri /index.html`
# which ensures that refreshing a React Router URL (e.g. /scenarios/42)
# returns index.html rather than a 404 — React Router then handles the path.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Serve static assets with aggressive caching.
    # Vite fingerprints asset filenames (e.g. main.a3f9c1.js) so
    # cache-busting is automatic — safe to cache for 1 year.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # All other routes → index.html (React Router handles the path)
    location / {
        try_files $uri /index.html;
    }

    # Health check endpoint for load balancers
    location /health {
        return 200 "ok";
        add_header Content-Type text/plain;
    }
}
